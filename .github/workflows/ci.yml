name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Run tests
        env:
          SAIDA_LLM_PROVIDER: mock
          SAIDA_EMBEDDING_PROVIDER: mock
          SAIDA_VECTOR_STORE_PROVIDER: mock
          SAIDA_DATA_SOURCE_PROVIDER: local_fs
        run: python -m pytest -q
